<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Learning Hub</title>
    <!-- Estilo base do login -->
    <link rel="stylesheet" href="estilos/style.css">
    <!-- Estilos extras do cadastro -->
    <link rel="stylesheet" href="estilos/cadastro.css">
    <!-- Script de validação do cadastro -->
    <script src="scripts/cadastro.js"></script>
</head>
<body>
    <!-- Container do formulário de cadastro -->
    <div class="login-container" role="form">
        <img src="imagens/logomarca.png" alt="Logo LH" class="logo-selo">
        <h1>CRIE SUA CONTA</h1>

        <!-- Campos do formulário -->
        <input type="email" id="email-cadastro" placeholder="Digite seu e-mail">
        <input type="password" id="senha-cadastro" placeholder="Crie uma senha">
        <input type="password" id="confirmar-senha" placeholder="Confirme sua senha">

        <!-- Botão de ação -->
        <button type="button" class="btn-login" onclick="finalizarCadastro()">CADASTRAR</button>

        <!-- Link para voltar ao login -->
        <a href="index.html">Já tenho uma conta? Entrar</a>
    </div>
</body>
</html>
